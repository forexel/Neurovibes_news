services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      LLM_TEXT_MODEL: ${LLM_TEXT_MODEL}
      LLM_IMAGE_MODEL: ${LLM_IMAGE_MODEL}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID}
      TELEGRAM_REVIEW_CHAT_ID: ${TELEGRAM_REVIEW_CHAT_ID}
    volumes:
      - ./app:/app/app
    ports:
      - "8001:8000"
    networks:
      - default
      - apps-net
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      LLM_TEXT_MODEL: ${LLM_TEXT_MODEL}
      LLM_IMAGE_MODEL: ${LLM_IMAGE_MODEL}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID}
      TELEGRAM_REVIEW_CHAT_ID: ${TELEGRAM_REVIEW_CHAT_ID}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./app:/app/app
    ports:
      - "8002:8000"
    networks:
      - default
      - apps-net
    restart: unless-stopped

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      LLM_TEXT_MODEL: ${LLM_TEXT_MODEL}
      LLM_IMAGE_MODEL: ${LLM_IMAGE_MODEL}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID}
      TELEGRAM_REVIEW_CHAT_ID: ${TELEGRAM_REVIEW_CHAT_ID}
      WORKER_INTERVAL_SECONDS: ${WORKER_INTERVAL_SECONDS:-3600}
      WORKER_BACKFILL_DAYS: ${WORKER_BACKFILL_DAYS:-1}
      SCHEDULE_TICK_SECONDS: ${SCHEDULE_TICK_SECONDS:-30}
      AUTO_PUBLISH_TIMES_UTC: ${AUTO_PUBLISH_TIMES_UTC:-}
    command: ["python", "-m", "app.tasks.worker"]
    volumes:
      - ./app:/app/app
    networks:
      - default
      - apps-net
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    profiles: ["local"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    profiles: ["local"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

networks:
  apps-net:
    external: true
