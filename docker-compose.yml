services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "18100:8000"
    networks:
      - apps-net
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "18101:8000"
    networks:
      - apps-net
    restart: unless-stopped

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    command: ["python", "-m", "app.tasks.worker"]
    networks:
      - apps-net
    restart: unless-stopped

  neuro-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: neurovibes_news
      POSTGRES_USER: neurovibes
      POSTGRES_PASSWORD: ${NEURO_DB_PASSWORD}
    volumes:
      - neurovibes_pg:/var/lib/postgresql/data
    networks:
      - apps-net
    restart: unless-stopped

  # local-only helpers (do not start unless profile is enabled)
  db:
    image: pgvector/pgvector:pg16
    profiles: ["local"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - apps-net

  minio:
    image: minio/minio:latest
    profiles: ["local"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - apps-net

volumes:
  postgres_data:
  minio_data:
  neurovibes_pg:

networks:
  apps-net:
    external: true
