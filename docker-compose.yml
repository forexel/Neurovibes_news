services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_BUILD_SHA: ${APP_BUILD_SHA:-dev}
      DB_AUTO_PATCH_SCHEMA: "0"
      DB_AUTO_CREATE: "0"
      ALLOW_ONLINE_LLM_GENERATION: "0"
      TELEGRAM_PROXY: ${TELEGRAM_PROXY:-}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1", "--timeout-keep-alive", "20"]
    ports:
      - "18100:8000"
    volumes:
      - model_artifacts:/app/app/static/models
    networks:
      - apps-net
    mem_limit: 384m
    mem_reservation: 256m
    cpus: "0.60"
    pids_limit: 200
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  admin:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_BUILD_SHA: ${APP_BUILD_SHA:-dev}
      DB_AUTO_PATCH_SCHEMA: "0"
      DB_AUTO_CREATE: "0"
      ALLOW_ONLINE_LLM_GENERATION: "0"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "18101:8000"
    volumes:
      - model_artifacts:/app/app/static/models
    networks:
      - apps-net
    mem_limit: 384m
    mem_reservation: 256m
    cpus: "0.60"
    pids_limit: 200
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_AUTO_PATCH_SCHEMA: "0"
      DB_AUTO_CREATE: "0"
      ALLOW_ONLINE_LLM_GENERATION: "0"
      TELEGRAM_PROXY: ${TELEGRAM_PROXY:-}
    command: ["python", "-m", "app.tasks.worker"]
    volumes:
      - model_artifacts:/app/app/static/models
    networks:
      - apps-net
    mem_limit: 768m
    mem_reservation: 256m
    cpus: "1.20"
    pids_limit: 260
    restart: unless-stopped

  neuro-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: neurovibes_news
      POSTGRES_USER: neurovibes
      POSTGRES_PASSWORD: ${NEURO_DB_PASSWORD}
    volumes:
      - neurovibes_pg:/var/lib/postgresql/data
    networks:
      - apps-net
    mem_limit: 384m
    mem_reservation: 256m
    cpus: "0.80"
    pids_limit: 180
    restart: unless-stopped

  # local-only helpers (do not start unless profile is enabled)
  db:
    image: pgvector/pgvector:pg16
    profiles: ["local"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - apps-net

  minio:
    image: minio/minio:latest
    profiles: ["local"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - apps-net

volumes:
  postgres_data:
  minio_data:
  neurovibes_pg:
  model_artifacts:

networks:
  apps-net:
    external: true
